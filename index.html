<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APK Uploader</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 560px;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }

    .upload-zone {
      border: 2px dashed #333;
      border-radius: 16px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: #161625;
    }

    .upload-zone:hover, .upload-zone.dragover {
      border-color: #0072ff;
      background: #1a1a30;
    }

    .upload-zone .icon { font-size: 48px; margin-bottom: 12px; }
    .upload-zone p { color: #aaa; font-size: 1rem; }
    .upload-zone .browse { color: #00c6ff; text-decoration: underline; cursor: pointer; }
    .upload-zone input[type="file"] { display: none; }

    .file-info {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      background: #1e1e32;
      border-radius: 10px;
      font-size: 0.9rem;
    }
    .file-info .name { color: #fff; font-weight: 600; }
    .file-info .size { color: #888; margin-left: 8px; }

    .progress-wrap {
      display: none;
      margin-top: 20px;
      background: #1e1e32;
      border-radius: 10px;
      overflow: hidden;
      height: 8px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      transition: width 0.2s;
      border-radius: 10px;
    }

    .progress-text {
      display: none;
      text-align: center;
      margin-top: 8px;
      font-size: 0.85rem;
      color: #888;
    }

    .upload-btn {
      display: none;
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      font-size: 1.05rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: #fff;
      transition: opacity 0.2s;
    }
    .upload-btn:hover { opacity: 0.9; }
    .upload-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .result {
      display: none;
      margin-top: 28px;
      padding: 24px;
      background: #161625;
      border-radius: 16px;
      border: 1px solid #2a2a40;
      text-align: center;
    }

    .result h2 { font-size: 1.2rem; margin-bottom: 16px; color: #4cff8b; }

    .result .qr-code {
      margin: 16px auto;
      background: #fff;
      border-radius: 12px;
      padding: 12px;
      display: inline-block;
    }

    .result .qr-code canvas { display: block; }

    .link-box {
      display: flex;
      margin-top: 16px;
      gap: 8px;
    }

    .link-box input {
      flex: 1;
      padding: 10px 14px;
      background: #1e1e32;
      border: 1px solid #333;
      border-radius: 10px;
      color: #fff;
      font-size: 0.85rem;
      outline: none;
    }

    .link-box button {
      padding: 10px 18px;
      background: #0072ff;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
    }
    .link-box button:hover { opacity: 0.85; }

    .result .hint { margin-top: 14px; font-size: 0.82rem; color: #777; }

    .new-upload-btn {
      margin-top: 18px;
      padding: 10px 28px;
      background: transparent;
      border: 1px solid #444;
      border-radius: 10px;
      color: #ccc;
      cursor: pointer;
      font-size: 0.9rem;
      transition: border-color 0.2s;
    }
    .new-upload-btn:hover { border-color: #00c6ff; color: #fff; }

    .error-msg {
      display: none;
      margin-top: 16px;
      padding: 12px;
      background: #2a1020;
      border: 1px solid #ff4060;
      border-radius: 10px;
      color: #ff6080;
      font-size: 0.9rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📦 APK Uploader</h1>
    <p class="subtitle">Upload an APK and get a download link + QR code</p>

    <div class="upload-zone" id="dropZone">
      <div class="icon">☁️</div>
      <p>Drag & drop your <strong>.apk</strong> file here</p>
      <p>or <span class="browse">browse files</span></p>
      <input type="file" id="fileInput" accept=".apk">
    </div>

    <div class="file-info" id="fileInfo">
      <span class="name" id="fileName"></span>
      <span class="size" id="fileSize"></span>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-text" id="progressText"></div>

    <div class="error-msg" id="errorMsg"></div>

    <button class="upload-btn" id="uploadBtn">Upload APK</button>

    <div class="result" id="result">
      <h2>✅ Upload Complete!</h2>
      <p style="color:#ccc; font-size:0.95rem;" id="resultFileName"></p>

      <div class="qr-code" id="qrWrap">
        <canvas id="qrCanvas"></canvas>
      </div>
      <p class="hint">Scan this QR code on your phone to download & install</p>

      <div class="link-box">
        <input type="text" id="linkInput" readonly>
        <button id="copyBtn">Copy</button>
      </div>

      <div class="link-box" style="margin-top: 8px;">
        <input type="text" id="directLinkInput" readonly>
        <button id="copyDirectBtn">Copy</button>
      </div>
      <p class="hint">Top: download page link &nbsp;|&nbsp; Bottom: direct APK link</p>

      <button class="new-upload-btn" id="newUploadBtn">Upload another</button>
    </div>
  </div>

  <!-- All client-side: Supabase + QR code via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="config.js"></script>
  <script>
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const BUCKET = 'apk-uploads';

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const fileNameEl = document.getElementById('fileName');
    const fileSizeEl = document.getElementById('fileSize');
    const uploadBtn = document.getElementById('uploadBtn');
    const progressWrap = document.getElementById('progressWrap');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const errorMsg = document.getElementById('errorMsg');
    const result = document.getElementById('result');

    let selectedFile = null;

    // Drag & drop
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) selectFile(e.dataTransfer.files[0]);
    });
    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) selectFile(fileInput.files[0]); });

    function selectFile(file) {
      if (!file.name.toLowerCase().endsWith('.apk')) {
        showError('Please select a .apk file');
        return;
      }
      selectedFile = file;
      fileNameEl.textContent = file.name;
      fileSizeEl.textContent = formatSize(file.size);
      fileInfo.style.display = 'block';
      uploadBtn.style.display = 'block';
      errorMsg.style.display = 'none';
      result.style.display = 'none';
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }

    // Upload directly to Supabase Storage
    uploadBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      uploadBtn.disabled = true;
      progressWrap.style.display = 'block';
      progressText.style.display = 'block';
      errorMsg.style.display = 'none';

      progressBar.style.width = '20%';
      progressText.textContent = 'Uploading to cloud...';

      try {
        const sanitized = selectedFile.name.replace(/[^a-zA-Z0-9._-]/g, '_');
        const storagePath = Date.now() + '-' + sanitized;

        const { error: uploadError } = await sb.storage
          .from(BUCKET)
          .upload(storagePath, selectedFile, {
            contentType: 'application/vnd.android.package-archive',
            upsert: false
          });

        if (uploadError) {
          showError('Upload failed: ' + uploadError.message);
          uploadBtn.disabled = false;
          progressWrap.style.display = 'none';
          progressText.style.display = 'none';
          return;
        }

        progressBar.style.width = '75%';
        progressText.textContent = 'Getting download link...';

        // Public URL from Supabase
        const { data: urlData } = sb.storage
          .from(BUCKET)
          .getPublicUrl(storagePath);

        const publicUrl = urlData.publicUrl;

        // Save metadata
        await sb.from('apk_uploads').insert({
          original_name: selectedFile.name,
          storage_path: storagePath,
          file_size: selectedFile.size,
          download_url: publicUrl
        });

        progressBar.style.width = '100%';
        progressText.textContent = 'Upload complete!';

        await showResult({
          filename: selectedFile.name,
          size: selectedFile.size,
          downloadUrl: publicUrl
        });

      } catch (e) {
        showError('Error: ' + e.message);
        uploadBtn.disabled = false;
      }
    });

    async function showResult(data) {
      const base = window.location.href.replace(/\/[^/]*$/, '');
      const pageLink = base + '/download.html?url=' + encodeURIComponent(data.downloadUrl)
        + '&name=' + encodeURIComponent(data.filename)
        + '&size=' + data.size;

      document.getElementById('resultFileName').textContent = data.filename + ' (' + formatSize(data.size) + ')';
      document.getElementById('linkInput').value = pageLink;
      document.getElementById('directLinkInput').value = data.downloadUrl;

      // QR code generated entirely client-side
      try {
        await QRCode.toCanvas(document.getElementById('qrCanvas'), data.downloadUrl, {
          width: 240, margin: 2,
          color: { dark: '#000000', light: '#ffffff' }
        });
      } catch {
        document.getElementById('qrWrap').style.display = 'none';
      }

      result.style.display = 'block';
    }

    // Copy buttons
    document.getElementById('copyBtn').addEventListener('click', () => copyText('linkInput', 'copyBtn'));
    document.getElementById('copyDirectBtn').addEventListener('click', () => copyText('directLinkInput', 'copyDirectBtn'));

    function copyText(inputId, btnId) {
      const input = document.getElementById(inputId);
      const btn = document.getElementById(btnId);
      navigator.clipboard.writeText(input.value).then(() => {
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 2000);
      });
    }

    // Reset
    document.getElementById('newUploadBtn').addEventListener('click', () => {
      selectedFile = null;
      fileInput.value = '';
      fileInfo.style.display = 'none';
      uploadBtn.style.display = 'none';
      uploadBtn.disabled = false;
      progressWrap.style.display = 'none';
      progressText.style.display = 'none';
      result.style.display = 'none';
      errorMsg.style.display = 'none';
      progressBar.style.width = '0%';
    });
  </script>
</body>
</html>
