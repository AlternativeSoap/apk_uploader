<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download APK</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      text-align: center;
      max-width: 420px;
      width: 100%;
      padding: 40px 24px;
      background: #161625;
      border-radius: 20px;
      border: 1px solid #2a2a40;
      margin: 20px;
    }

    .icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 6px;
      color: #fff;
    }

    .app-name {
      color: #00c6ff;
      word-break: break-all;
      font-size: 1.05rem;
      margin-bottom: 6px;
    }

    .file-size {
      color: #777;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .download-btn {
      display: inline-block;
      width: 100%;
      padding: 16px;
      font-size: 1.15rem;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      background: linear-gradient(135deg, #4cff8b, #00c6ff);
      color: #0f0f1a;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.1s;
    }

    .download-btn:hover { opacity: 0.9; }
    .download-btn:active { transform: scale(0.98); }

    .instructions {
      margin-top: 28px;
      text-align: left;
      background: #1e1e32;
      border-radius: 12px;
      padding: 16px 20px;
    }

    .instructions h3 {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .instructions ol {
      padding-left: 18px;
      color: #bbb;
      font-size: 0.9rem;
      line-height: 1.8;
    }

    .footer {
      margin-top: 24px;
      font-size: 0.78rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📲</div>
    <h1>Ready to install</h1>
    <p class="app-name" id="appName">--</p>
    <p class="file-size" id="fileSize"></p>

    <a class="download-btn" id="downloadBtn" href="#">
      ⬇ Download & Install
    </a>

    <div class="instructions">
      <h3>How to install</h3>
      <ol>
        <li>Tap the download button above</li>
        <li>Open the downloaded <strong>.apk</strong> file</li>
        <li>If prompted, allow installing from this source</li>
        <li>Tap <strong>Install</strong> and you're done!</li>
      </ol>
    </div>

    <p class="footer">Shared via APK Uploader</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const url = params.get('url');   // Supabase public URL
    const name = params.get('name');
    const size = params.get('size');

    if (url) {
      document.getElementById('downloadBtn').href = url;
      document.getElementById('appName').textContent = name || 'APK File';

      if (size) {
        const mb = (parseInt(size) / 1048576).toFixed(1);
        document.getElementById('fileSize').textContent = mb + ' MB';
      }
    } else {
      document.getElementById('appName').textContent = 'No file specified';
      document.getElementById('downloadBtn').style.display = 'none';
    }
  </script>
</body>
</html>
